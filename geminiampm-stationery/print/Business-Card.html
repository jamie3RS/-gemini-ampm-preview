<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<title>Gemini AMPM — Business Card (85×55mm)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Archivo:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Fredoka:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sheets.css" />
<link rel="stylesheet" href="stationery.css" />
<style>@page { size: 85mm 55mm; margin: 0; } @media print { body { gap: 0; } }</style>
</head>
<body class="has-bar on-night">
  <div class="print-bar">
    <span class="pb-logo">Gemini AMPM · Business Card · 85×55mm · front + back</span>
    <button onclick="window.print()">Print / Save as PDF ↓</button>
  </div>

  <div class="card-pair">
    <div class="sheet card front">
      <div>
        <div class="card-name">[ Name ]</div>
        <div class="card-role">[ Role / title ]</div>
      </div>
      <div class="card-lines">
        <span class="d">T</span> 0330 043 0080<br />
        <span class="d">M</span> [ mobile ]<br />
        <span class="d">E</span> name@geminiampm.co.uk
      </div>
      <div class="card-foot">
        <div class="meridian card-meridian"><span class="o"></span><span class="g"></span><span class="b"></span><span class="p"></span></div>
        <div class="card-tag">geminiampm.co.uk</div>
      </div>
    </div>

    <div class="sheet card back">
      <span class="glogo on-night"><span class="glogo-word">gemini</span><span class="glogo-ampm"><i style="--c:#E8742C">A</i><i style="--c:#3D8E2E">M</i><i style="--c:#2E5FAB">P</i><i style="--c:#7A2E8F">M</i></span></span>
      <div class="card-tag">Fire · Security · Ventilation · Passive Fire</div>
    </div>
  </div>
</body>
</html>
