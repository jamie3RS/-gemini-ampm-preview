<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<title>AMPM Building Services — Business Card (press-ready, bleed + crop)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sheets.css" />
<link rel="stylesheet" href="stationery.css" />
<style>
  /* Page = 91×61mm bleed box + 4mm registration margin = 99×69mm.
     Trim 85×55mm, 3mm bleed, crop marks in the white margin. */
  @page { size: 99mm 69mm; margin: 0; }
  body { gap: 22px; }
  .bleed-page {
    position: relative; width: 99mm; height: 69mm; background: #fff; overflow: hidden;
    box-shadow: 0 18px 50px -28px rgba(26,31,43,0.5);
  }
  .bleed-fill { position: absolute; left: 4mm; top: 4mm; width: 91mm; height: 61mm; }
  .bleed-page.front .bleed-fill { background: #ffffff; }
  .bleed-page.back  .bleed-fill { background: var(--ink); }

  .trim-area {
    position: absolute; left: 7mm; top: 7mm; width: 85mm; height: 55mm; padding: 8mm;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .bleed-page.back .trim-area { align-items: center; justify-content: center; gap: 6mm; color: var(--paper); text-align: center; }

  /* trim guide — screen only */
  .trim-guide { position: absolute; left: 7mm; top: 7mm; width: 85mm; height: 55mm; outline: 1px dashed rgba(120,120,120,0.5); pointer-events: none; }

  /* crop marks */
  .cm { position: absolute; background: #111; }
  .cm.v { width: 0.3mm; height: 3mm; transform: translateX(-0.15mm); }
  .cm.h { height: 0.3mm; width: 3mm; transform: translateY(-0.15mm); }
  .bleed-page.back .cm { background: #111; }

  .label { position: absolute; left: 7mm; bottom: 1.4mm; font-family: var(--mono); font-size: 5.4pt; letter-spacing: 0.1em; color: #999; text-transform: uppercase; }

  @media print {
    body { background: #fff; gap: 0; padding: 0; }
    .bleed-page { box-shadow: none; page-break-after: always; }
    .trim-guide, .label { display: none; }
  }
</style>
</head>
<body class="has-bar">
  <div class="print-bar no-print">
    <span>AMPM Building Services · Business Card · 85×55mm trim + 3mm bleed + crop marks</span>
    <button onclick="window.print()">Print / Save as PDF ↓</button>
  </div>

  <!-- FRONT -->
  <div class="bleed-page front">
    <div class="bleed-fill"></div>
    <div class="trim-guide no-print"></div>
    <span class="cm v" style="left:7mm;top:1mm;"></span><span class="cm v" style="left:92mm;top:1mm;"></span>
    <span class="cm v" style="left:7mm;top:65mm;"></span><span class="cm v" style="left:92mm;top:65mm;"></span>
    <span class="cm h" style="left:1mm;top:7mm;"></span><span class="cm h" style="left:95mm;top:7mm;"></span>
    <span class="cm h" style="left:1mm;top:62mm;"></span><span class="cm h" style="left:95mm;top:62mm;"></span>
    <div class="trim-area">
      <div>
        <div class="card-name">Jamie Dawson</div>
        <div class="card-role">Chairman</div>
      </div>
      <div class="card-lines">
        <span class="lead-dot">T</span>&nbsp; 0330 043 0080<br />
        <span class="lead-dot">M</span>&nbsp; 07700 900123<br />
        <span class="lead-dot">E</span>&nbsp; jamie.dawson@ampm.co.uk
      </div>
      <div class="card-foot">
        <div class="card-meridian"><span class="o"></span><span class="g"></span><span class="b"></span><span class="p"></span></div>
        <div class="card-tag">ampm.co.uk</div>
      </div>
    </div>
    <span class="label no-print">Front · trim 85×55 · bleed 91×61</span>
  </div>

  <!-- BACK -->
  <div class="bleed-page back">
    <div class="bleed-fill"></div>
    <div class="trim-guide no-print"></div>
    <span class="cm v" style="left:7mm;top:1mm;"></span><span class="cm v" style="left:92mm;top:1mm;"></span>
    <span class="cm v" style="left:7mm;top:65mm;"></span><span class="cm v" style="left:92mm;top:65mm;"></span>
    <span class="cm h" style="left:1mm;top:7mm;"></span><span class="cm h" style="left:95mm;top:7mm;"></span>
    <span class="cm h" style="left:1mm;top:62mm;"></span><span class="cm h" style="left:95mm;top:62mm;"></span>
    <div class="trim-area">
      <svg width="150" height="84" viewBox="0 0 172 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AMPM Building Services">
        <text x="0" y="52" font-family="'Source Serif 4',Georgia,serif" font-weight="600" font-size="50" letter-spacing="-0.012em" fill="#f6f3ec">AMPM</text>
        <rect x="1" y="63" width="40" height="6" fill="#E8742C"/>
        <rect x="42" y="63" width="40" height="6" fill="#3D8E2E"/>
        <rect x="83" y="63" width="40" height="6" fill="#2E5FAB"/>
        <rect x="124" y="63" width="40" height="6" fill="#7A2E8F"/>
        <rect x="1" y="84" width="15" height="2" fill="#5BAA47"/>
        <text x="23" y="88" font-family="'JetBrains Mono',monospace" font-size="10" letter-spacing="0.235em" fill="rgba(246,243,236,0.78)">BUILDING SERVICES</text>
      </svg>
      <div class="card-tag" style="color:rgba(246,243,236,0.5);text-align:center;">M&amp;E · Fit-out · Fabric · Roofing · Groundworks</div>
    </div>
    <span class="label no-print">Back · trim 85×55 · bleed 91×61</span>
  </div>
</body>
</html>
