<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<title>AMPM Group · Strategic Artefacts (Deck)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; background: #1a1f2b; }
  #stage { width: 1920px; margin: 0 auto; }
  .deck-slide { position: relative; width: 1920px; height: 1080px; background: #f6f3ec; overflow: hidden; margin-bottom: 24px; }
  .deck-slide .artboard, .deck-slide .artboard-inner { width: 100% !important; height: 100% !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="artefact-architecture.jsx"></script>
<script type="text/babel" src="artefact-window.jsx"></script>
<script type="text/babel" src="artefact-matrix.jsx"></script>
<script type="text/babel" src="artefact-brand-dna.jsx"></script>
<script type="text/babel" src="artefact-brand-continuum.jsx"></script>
<script type="text/babel" src="artefact-brand-meridian.jsx"></script>
<script type="text/babel" src="artefact-brand-applications.jsx"></script>
<script type="text/babel" src="artefact-brand-shapes.jsx"></script>
<script type="text/babel" data-presets="env,react">
  function Deck() {
    const slides = [
      <ArchitectureArtefact horizon={5} structureMode="full" />,
      <WindowArtefact density="full" />,
      <MatrixArtefact horizon={5} />,
      <DnaArtefact />,
      <ContinuumArtefact />,
      <MeridianArtefact />,
      <ApplicationsArtefact direction="meridian" />,
      <ShapeLanguageArtefact />,
    ];
    return <div id="stage">{slides.map((s, i) => <div key={i} className="deck-slide" data-slide-index={i}>{s}</div>)}</div>;
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Deck />);
</script>
</body>
</html>
