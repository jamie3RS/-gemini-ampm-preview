<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<title>AMPM · The mothership for buildings that cannot afford to fail</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="site.css" />

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#1a1f2b"/>
    <g transform="translate(40 80)">
      <rect x="0" y="0" width="30" height="6" fill="#E8742C"/>
      <rect x="30" y="0" width="30" height="6" fill="#5BAA47"/>
      <rect x="60" y="0" width="30" height="6" fill="#2E5FAB"/>
      <rect x="90" y="0" width="30" height="6" fill="#7A2E8F"/>
    </g>
    <text x="100" y="120" text-anchor="middle" fill="#f6f3ec" font-family="Georgia, serif" font-size="34" font-weight="500" letter-spacing="-0.01em">AMPM</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="site-components.jsx"></script>
  <script type="text/babel" src="site-pages.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": [
        "#E8742C",
        "#5BAA47",
        "#2E5FAB",
        "#7A2E8F"
      ],
      "heroVariant": "buildings",
      "typeScale": 1.01,
      "density": "regular",
      "showCounters": true,
      "showTrustees": true,
      "peopleMode": "all"
    }/*EDITMODE-END*/;

    const PALETTE_OPTIONS = [
      ["#E8742C", "#5BAA47", "#2E5FAB", "#7A2E8F"], // Original meridian
      ["#C8462B", "#1F8A5B", "#1D2A44", "#8A6A1F"], // Institutional warm
      ["#D97757", "#3A4150", "#6b7080", "#1a1f2b"], // Mono editorial
      ["#FF6B35", "#06A77D", "#0353A4", "#B7245C"], // Hi-contrast bright
    ];

    const DENSITY_PAD = { compact: 64, regular: 96, spacious: 128 };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [route, setRoute] = React.useState("home");
      React.useEffect(() => { window.scrollTo({ top: 0, behavior: "instant" }); }, [route]);

      // Apply palette + type scale + density as CSS variables on :root.
      React.useEffect(() => {
        const r = document.documentElement.style;
        (t.palette || PALETTE_OPTIONS[0]).forEach((c, i) => r.setProperty(`--ampm-c${i + 1}`, c));
        r.setProperty("--type-scale", t.typeScale || 1);
        r.setProperty("--section-pad", `${DENSITY_PAD[t.density] || 96}px`);
      }, [t.palette, t.typeScale, t.density]);

      const Page =
        route === "companies" ? CompaniesPage :
        route === "approach"  ? ApproachPage :
        route === "people"    ? PeoplePage :
        route === "contact"   ? ContactPage :
                                HomePage;
      return (
        <>
          <SiteHeader route={route} setRoute={setRoute} dark={false} />
          <main>
            <Page setRoute={setRoute} tweaks={t} />
          </main>
          <SiteFooter setRoute={setRoute} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Brand" />
            <TweakColor
              label="Meridian palette"
              value={t.palette}
              options={PALETTE_OPTIONS}
              onChange={(v) => setTweak("palette", v)}
            />

            <TweakSection label="Home" />
            <TweakSelect
              label="Hero headline"
              value={t.heroVariant}
              options={[
                { value: "buildings",  label: "Holding the buildings" },
                { value: "mothership", label: "The mothership" },
                { value: "six",        label: "Six companies, one mothership" },
              ]}
              onChange={(v) => setTweak("heroVariant", v)}
            />
            <TweakToggle
              label="Show counters"
              value={t.showCounters}
              onChange={(v) => setTweak("showCounters", v)}
            />

            <TweakSection label="People" />
            <TweakRadio
              label="Scope"
              value={t.peopleMode}
              options={[
                { value: "all",        label: "All" },
                { value: "leadership", label: "Leadership" },
              ]}
              onChange={(v) => setTweak("peopleMode", v)}
            />
            <TweakToggle
              label="Show EOT trustees"
              value={t.showTrustees}
              onChange={(v) => setTweak("showTrustees", v)}
            />

            <TweakSection label="Layout" />
            <TweakRadio
              label="Density"
              value={t.density}
              options={["compact", "regular", "spacious"]}
              onChange={(v) => setTweak("density", v)}
            />
            <TweakSlider
              label="Type scale"
              value={t.typeScale}
              min={0.9} max={1.15} step={0.01}
              onChange={(v) => setTweak("typeScale", v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
