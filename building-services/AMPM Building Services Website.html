<!doctype html>
<html lang="en-GB" data-arc="full" data-atmos="animated">
<head>
<meta charset="utf-8" />
<title>AMPM Building Services — MEPH, Commercial, Fabric & Groundworks · AMPM Group</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Compliance-led building services across MEPH, Commercial, Fabric and Groundworks — one accountable contractor for London and the South East. Part of AMPM Group." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800&family=Archivo:wght@400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hybrid.css?v=5" />
<script src="image-slot.js"></script>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#fdfaf2" />
    <g transform="translate(60 78)">
      <rect x="0" y="0" width="18" height="18" fill="#3D8E2E" />
      <rect x="22" y="0" width="18" height="18" fill="#7A2E8F" />
      <rect x="0" y="22" width="18" height="18" fill="#E8742C" />
      <rect x="22" y="22" width="18" height="18" fill="#2E5FAB" />
    </g>
    <text x="100" y="135" text-anchor="middle" fill="#1c1812" font-family="Arial Black, sans-serif" font-size="30" font-weight="800" letter-spacing="0.02em">AMPM</text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="bs-data.jsx?v=2"></script>
<script type="text/babel" src="bs-shell.jsx?v=3"></script>
<script type="text/babel" src="bs-home.jsx?v=2"></script>
<script type="text/babel" src="bs-pages-a.jsx?v=2"></script>
<script type="text/babel" src="bs-pages-b.jsx?v=2"></script>
<script type="text/babel" src="bs-service.jsx?v=2"></script>
<script type="text/babel" src="bs-service.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "dayArc": "full",
    "atmosphere": "Animated",
    "displayFont": "Big Shoulders",
    "phone": "0330 043 0080"
  }/*EDITMODE-END*/;

  const SERVICE_ROUTES = ["meph", "commercial", "fabric", "groundworks"];
  const ROUTE_IDS = ["home", "services", "work", "compliance", "about", "contact"].concat(SERVICE_ROUTES);
  function readHash() {
    const h = (location.hash || "").replace("#", "");
    return ROUTE_IDS.indexOf(h) >= 0 ? h : "home";
  }

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [route, setRouteState] = React.useState(readHash());

    const setRoute = React.useCallback((id) => {
      setRouteState(id);
      if (location.hash.replace("#", "") !== id) location.hash = id;
      window.scrollTo({ top: 0, behavior: "instant" });
    }, []);

    React.useEffect(() => {
      const onHash = () => setRouteState(readHash());
      window.addEventListener("hashchange", onHash);
      return () => window.removeEventListener("hashchange", onHash);
    }, []);

    // Tweaks → document
    React.useEffect(() => {
      const root = document.documentElement;
      root.setAttribute("data-arc", (t.dayArc === "Subtle" || t.dayArc === "subtle") ? "subtle" : "full");
      root.setAttribute("data-atmos", t.atmosphere === "Still" ? "still" : "animated");
      const fam = t.displayFont === "Archivo Black"
        ? '"Archivo Black", "Archivo", sans-serif'
        : '"Big Shoulders Display", "Archivo", sans-serif';
      root.style.setProperty("--d-display", fam);
      // sync any hardcoded phone node (home hero)
      const tel = "tel:" + String(t.phone).replace(/\s+/g, "");
      document.querySelectorAll("#big-phone").forEach((el) => { el.textContent = t.phone; el.setAttribute("href", tel); });
    }, [t, route]);

    const phone = t.phone;
    let Page;
    if (SERVICE_ROUTES.indexOf(route) >= 0) Page = <ServiceDetailPage id={route} setRoute={setRoute} />;
    else if (route === "services") Page = <ServicesPage setRoute={setRoute} />;
    else if (route === "work") Page = <WorkPage setRoute={setRoute} />;
    else if (route === "compliance") Page = <CompliancePage setRoute={setRoute} />;
    else if (route === "about") Page = <AboutPage setRoute={setRoute} />;
    else if (route === "contact") Page = <ContactPage setRoute={setRoute} phone={phone} />;
    else Page = <Home setRoute={setRoute} />;

    return (
      <>
        <Nav route={route} setRoute={setRoute} phone={phone} />
        {Page}
        {route !== "home" && <Footer setRoute={setRoute} phone={phone} />}

        <TweaksPanel>
          <TweakSection label="The day arc" />
          <TweakRadio label="Sky gradient" value={t.dayArc === "subtle" ? "Subtle" : "Full"}
            options={["Full", "Subtle"]} onChange={(v) => setTweak("dayArc", v.toLowerCase())} />
          <TweakRadio label="Atmosphere" value={t.atmosphere || "Animated"}
            options={["Animated", "Still"]} onChange={(v) => setTweak("atmosphere", v)} />
          <TweakSection label="Type" />
          <TweakRadio label="Display face" value={t.displayFont}
            options={["Big Shoulders", "Archivo Black"]} onChange={(v) => setTweak("displayFont", v)} />
          <TweakSection label="Details" />
          <TweakText label="Phone number" value={t.phone} onChange={(v) => setTweak("phone", v)} />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
